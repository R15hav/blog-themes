<script>
(function () {
  const id = new URLSearchParams(location.search).get('id');
  const theme = themeById(id);

  if (!theme) {
    document.getElementById('js-page').innerHTML = `
      <div style="padding:80px 48px; font-family:var(--font-sans);">
        <p style="color:var(--ink-3);">Theme not found: <code>${id || '(no id)'}</code></p>
        <a href="index.html" class="btn btn-ghost btn-sm" style="margin-top:12px; display:inline-flex;">← Back to gallery</a>
      </div>`;
    return;
  }

  /* Load theme Google Font */
  const fontLink = document.createElement('link');
  fontLink.rel = 'stylesheet';
  fontLink.href = theme.googleFonts;
  document.head.appendChild(fontLink);

  document.title = `${theme.name} — Blog Theme Store`;

  const url = cdnUrl(theme);
  const scope = themeScope(theme);

  /* ── Mock panels ─────────────────────────────────────────────── */

  }

  function panelArticle() {
    return `
<div class="theme-scope" style="${scope}">
  ${mockNav()}
  <div class="article-shell">
    <div class="article-toc">
      <div class="toc-wrap">
        <div class="toc-tab">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
        </div>
        <div class="toc-panel" style="opacity:1; pointer-events:auto; transform:none;">
          <p class="toc-panel-title">Contents</p>
          <ul class="toc-list">
            <li class="active">Introduction</li>
            <li>Historical Context</li>
            <li class="sub">The Gutenberg Press</li>
            <li>The Emotional Register</li>
            <li>Practical Choices</li>
            <li>Conclusion</li>
          </ul>
          <div class="toc-footer">8 min read · Apr 15, 2025</div>
        </div>
      </div>
    </div>
    <div class="article-body">
      <div class="article-eyebrow">Design</div>
      <h1 class="article-title">The Architecture of Meaning in Typography</h1>
      <p class="article-deck">How typeface shapes the reader's emotional relationship with content — and why it matters more now than ever before.</p>
      <div class="byline">
        <div class="avatar lg">R</div>
        <div class="byline-text">
          <span class="byline-name">R15hav</span>
          <div class="byline-meta"><span>Apr 15, 2025</span><span class="dot-sep"></span><span>8 min read</span></div>
        </div>
      </div>
      <p>Typography is not decoration. It is the architecture through which meaning is communicated. Before a reader processes a single word, they have already received a signal — from the weight of the strokes, the rhythm of the spacing, the mood of the letterforms themselves.</p>
      <p>The choice between a sharp sans-serif and a warmly imperfect slab is not merely aesthetic. It is a claim about authority, intimacy, era, and intention. The reader decodes it subconsciously, instantly, and without training.</p>
      <h2>Historical Context</h2>
      <p>Every typeface carries cultural memory. Garamond whispers of the Renaissance scriptorium. Helvetica speaks of Swiss rationalism and corporate confidence. Each letterform is a sediment layer of intention from the hands that drew it and the presses that first cast it in lead.</p>
      <blockquote>Typography is what language looks like. The design of a page is a claim about the nature of reading.</blockquote>
      <p>Understanding this inheritance does not mean being enslaved to it — but it does mean being honest about the connotations you invoke when you choose a face.</p>
      <h2>The Emotional Register</h2>
      <p>Readers bring their history with them. A newspaper typeface signals accountability; a literary serif signals care; a geometric sans signals modernity. These are not rules — they are tendencies formed by decades of exposure. A designer works with those tendencies, or against them deliberately.</p>
      <p>The most common mistake is choosing a typeface for how it looks in isolation. A display face that is striking on a slide deck may be exhausting at 400 words, let alone 4,000. Setting type for sustained reading is fundamentally different from setting type for impact.</p>

      <!-- More articles -->

        <div class="list" style="pointer-events:none; cursor:default;">
          <div class="list-item">
            <span class="list-num">01</span>
            <div>
              <h3 class="list-title" style="font-size:18px; margin:0 0 5px;">The Grammar of Colour</h3>
              <p class="list-deck" style="font-size:14px; margin:0 0 7px;">Understanding the perceptual logic behind oklch and why it produces better palettes than sRGB colour spaces.</p>
              <div class="list-meta"><span class="tag">Colour</span><span class="meta">Mar 22, 2025</span><span class="dot-sep"></span><span class="meta">6 min read</span></div>
            </div>
            <span class="list-aside">6 min</span>
          </div>
          <div class="list-item">
            <span class="list-num">02</span>
            <div>

              <p class="list-deck" style="font-size:14px; margin:0 0 7px;">What digital reading has lost and how typography can restore the conditions for focused, pleasurable reading.</p>
              <div class="list-meta"><span class="tag">Essay</span><span class="meta">Mar 10, 2025</span><span class="dot-sep"></span><span class="meta">9 min read</span></div>
            </div>
            <span class="list-aside">9 min</span>
          </div>
          <div class="list-item">
            <span class="list-num">03</span>
            <div>
              <h3 class="list-title" style="font-size:18px; margin:0 0 5px;">Why Whitespace Is Never Wasted</h3>
              <p class="list-deck" style="font-size:14px; margin:0 0 7px;">Negative space is as expressive as the marks on the page — and far more often misunderstood by those who haven't studied the grid.</p>
              <div class="list-meta"><span class="tag">Design</span><span class="meta">Feb 28, 2025</span><span class="dot-sep"></span><span class="meta">5 min read</span></div>
            </div>
            <span class="list-aside">5 min</span>
          </div>
          <div class="list-item">
            <span class="list-num">04</span>
            <div>
              <h3 class="list-title" style="font-size:18px; margin:0 0 5px;">Design Tokens at Scale</h3>

          </div>
        </div>
      </div>

      </button>
    </div>
  </div>
</div>`;

        <a>

  /* ── Token table rows ──────────────────────────────────────────── */
  const TOKEN_DEFS = [
    ['paper',      '--paper',       'Primary page background'],
    ['paper2',     '--paper-2',     'Cards, sidebar, secondary surfaces'],
    ['paper3',     '--paper-3',     'Hover tints, muted fills'],
    ['rule',       '--rule',        'Default border / divider'],
    ['ruleSoft',   '--rule-soft',   'Subtle secondary divider'],
    ['ink',        '--ink',         'Primary text'],
    ['ink2',       '--ink-2',       'Secondary text'],
    ['ink3',       '--ink-3',       'Tertiary / muted text'],
    ['ink4',       '--ink-4',       'Ultra-muted labels, timestamps'],
    ['accent',     '--accent',      'Brand color — buttons, links, highlights'],
    ['accentSoft', '--accent-soft', 'Tinted accent background'],
    ['accentInk',  '--accent-ink',  'Darker accent — readable on --paper'],
    ['ok',         '--ok',          'Success states'],
    ['warn',       '--warn',        'Warning states'],
    ['rSm',        '--r-sm',        'Radius — small elements'],
    ['r',          '--r',           'Radius — default'],
    ['rLg',        '--r-lg',        'Radius — large surfaces'],
  ];

  function tokenRows(theme) {
    return TOKEN_DEFS.map(([key, name, role]) => {
      const val = theme.t[key];
      const isRadius = name.startsWith('--r-') || name === '--r';
      const swatch = isRadius
        ? `<span style="font-family:var(--font-mono); font-size:11px; color:var(--ink-4);">${val}</span>`
        : `<span class="tok-swatch" style="background:${val};"></span><span class="tok-val">${val}</span>`;
      return `<tr>
        <td><span class="tok-name">${name}</span></td>
        <td>${swatch}</td>
        <td>${role}</td>
      </tr>`;
    }).join('');
  }

        <div>
          <div class="how-step-title">Copy the CDN URL</div>
          <div class="how-step-desc">The compiled CSS is hosted on jsDelivr, served directly from this GitHub repo. The version number in the filename makes the URL immutable — the CDN will never silently change under you.</div>
          <div class="how-code">${url}</div>
        </div>
      </div>
      <div class="how-step">
        <div class="how-step-num">2</div>
        <div>
          <div class="how-step-title">Open Admin → Theme</div>
          <div class="how-step-desc">Sign in to your blog admin, navigate to <strong>Admin → Theme</strong>. Enter a name (e.g. "${theme.name}") and paste the URL into the URL field, then click Add.</div>
          <div class="how-code"><span class="hl">POST</span> /api/v1/themes/
Content-Type: application/json

{ "name": "${theme.name}", "url": "<span class="hl">${url}</span>" }</div>
        </div>
      </div>
      <div class="how-step">
        <div class="how-step-num">3</div>
        <div>
          <div class="how-step-title">Activate — the theme loads instantly</div>
          <div class="how-step-desc">Click Activate on the theme card. The blog backend stores the active URL. On every page load, all three layouts inject it as a <code style="font-family:var(--font-mono); font-size:0.85em;">&lt;link&gt;</code> tag <em>after</em> globals.css — so theme rules override platform defaults automatically. No <code style="font-family:var(--font-mono); font-size:0.85em;">!important</code>, no hacks.</div>
          <div class="how-code">&lt;!-- injected into every page &lt;head&gt; --&gt;
&lt;link rel="stylesheet" href="<span class="hl">${url}</span>"&gt;</div>
        </div>
      </div>
      <div class="how-step">
        <div class="how-step-num">4</div>
        <div>
          <div class="how-step-title">Switch or remove any time</div>
          <div class="how-step-desc">Add a second theme URL and activate it — the old theme is replaced immediately. Delete removes it from the list. No server restart, no build step. The Google Fonts import inside each theme CSS loads automatically.</div>
          <div class="how-code"># Remove the active theme entirely (reverts to globals.css defaults):
<span class="hl">DELETE</span> /api/v1/themes/active</div>
        </div>
      </div>
      <div class="how-step">
        <div class="how-step-num">5</div>
        <div>
          <div class="how-step-title">Upgrading to a new version</div>
          <div class="how-step-desc">When a theme releases an update, the version number in the filename changes. Add the new URL and activate it to get fresh styles and bust the CDN cache.</div>
          <div class="how-code"># Current:  …/${theme.id}.1.0.0.css
# Updated:  …/${theme.id}.1.1.0.css  ← new version forces CDN refetch</div>
        </div>
      </div>
      <div class="how-step">
        <div class="how-step-num">6</div>
        <div>
          <div class="how-step-title">Build your own theme</div>
          <div class="how-step-desc">Scaffold from an existing theme, edit only <code style="font-family:var(--font-mono); font-size:0.85em;">scss/_variables.scss</code> for the palette, compile with one command. The CDN URL is printed to the terminal.</div>
          <div class="how-code">git clone https://github.com/R15hav/blog-themes.git
cd blog-themes && npm install

cp -r themes/${theme.id} themes/my-theme
# Edit themes/my-theme/scss/_variables.scss

npm run release:my-theme
# → themes/my-theme/my-theme.1.0.0.css
# → CDN URL printed to terminal</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Token table ──────────────────────────────────────────────── -->
  <div class="token-section">
    <h2>Design tokens</h2>
    <p>These CSS custom properties are set by this theme. Every component reads them via <code style="font-family:var(--font-mono); font-size:0.85em;">var(--token)</code>.</p>
    <table class="token-table">
      <thead>
        <tr><th>Token</th><th>Value</th><th>Role</th></tr>
      </thead>
      <tbody>${tokenRows(theme)}</tbody>
    </table>
  </div>

</div>`;

  /* ── Tab switching ──────────────────────────────────────────────── */
  document.getElementById('mockup-tabs').addEventListener('click', function (e) {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('#mockup-tabs .tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.mock-panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
  });

  /* ── Copy URL ───────────────────────────────────────────────────── */
  window.copyUrl = function () {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.getElementById('cdn-copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy URL'; btn.classList.remove('copied'); }, 2200);
    });
  };

})();
</script>
</body>
</html>
